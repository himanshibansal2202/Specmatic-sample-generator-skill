version: 3
systemUnderTest:
  service:
    $ref: "#/components/services/order-api"
    runOptions:
      $ref: "#/components/runOptions/order-api-test"
components:
  sources:
    order-contracts:
      git:
        url: https://github.com/specmatic/specmatic-order-contracts.git
  services:
    order-api:
      definitions:
        - definition:
            source:
              $ref: "#/components/sources/order-contracts"
            specs:
              - io/specmatic/examples/store/openapi/api_order_v5.yaml
  runOptions:
    order-api-test:
      openapi:
        type: test
        baseUrl: "{SUT_BASE_URL:http://localhost:8080}"
specmatic:
  settings:
    test:
      schemaResiliencyTests: none
